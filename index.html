<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="nav-logo">
            <h2>amazon</h2>
        </div>

        <div class="nav-search">
            <select>
                <option>All</option>
            </select>
            <input type="text" placeholder="Search Amazon">
            <button>🔍</button>
        </div>

        <div class="nav-links">
            <p>Hello, Sign in</p>
            <p>Returns & Orders</p>
            <p>Cart 🛒</p>
        </div>
    </header>

    <section class="hero">
        <h1>Welcome to Amazon Clone</h1>
    </section>

    <section class="products">

        <div class="card">
            <h3>Clothes</h3>
            <img src="https://via.placeholder.com/150">
        </div>

        <div class="card">
            <h3>Electronics</h3>
            <img src="https://via.placeholder.com/150">
        </div>

        <div class="card">
            <h3>Home</h3>
            <img src="https://via.placeholder.com/150">
        </div>

        <div class="card">
            <h3>Beauty</h3>
            <img src="https://via.placeholder.com/150">
        </div>

    </section>

</body>
</html>
